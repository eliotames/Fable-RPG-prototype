<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winds of Silence</title>
  <!--
    UI typefaces (display / prose / mono). BootScene waits for these before any
    text renders; every style in ui/Theme.js carries a system fallback, so the
    game still runs if the fonts host is unreachable.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Source+Code+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Roboto:ital,wght@0,400;0,500;0,700;1,400&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0c0a08; height: 100%; overflow: hidden; }
    /* Plain block container: Phaser's CENTER_BOTH does the centering. Flex
       centering here would stack on top of Phaser's canvas margins and shove
       the letterboxed canvas off-center. */
    #game { width: 100%; height: 100%; }
    /* Atmosphere chrome over the canvas (pure presentation; ui/Settings.js
       drives intensity and the slow breathe from the Options screen). */
    #fx-vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: radial-gradient(ellipse 72% 64% at 50% 46%, transparent 52%, rgba(5,4,3,.9) 130%);
      opacity: 0.55;
    }
    @keyframes vignette-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    #fx-vignette.breathe { animation: vignette-breathe 9s ease-in-out infinite; }
  </style>
  <!--
    Phaser 4 from the CDN provides the global `Phaser` (swap for a local copy
    to run fully offline). It loads before main.js: classic scripts in <head>
    execute immediately, module scripts are deferred until the DOM is parsed.
  -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@v4.0.0/dist/phaser.min.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="game"></div>
  <div id="fx-vignette"></div>
</body>
</html>
