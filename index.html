<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winds of Silence</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0b0c10; height: 100%; overflow: hidden; }
    #game { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; }
  </style>
  <!--
    Phaser 4 from the CDN provides the global `Phaser` (swap for a local copy
    to run fully offline). It loads before main.js: classic scripts in <head>
    execute immediately, module scripts are deferred until the DOM is parsed.
  -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@v4.0.0/dist/phaser.min.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="game"></div>
</body>
</html>
